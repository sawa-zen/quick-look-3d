name: Release

# Pushing a v* tag (or a manual run) signs → notarizes → builds the .dmg and
# attaches it to a GitHub Release.
#
# Secrets to register beforehand (after joining the Apple Developer Program):
#   MACOS_CERTIFICATE      … Developer ID Application cert (.p12) base64-encoded
#                            base64 -i cert.p12 | pbcopy
#   MACOS_CERTIFICATE_PWD  … password for that .p12
#   KEYCHAIN_PASSWORD      … any password for the temporary keychain
#   APPLE_TEAM_ID          … Team ID (10 chars)
#   NOTARY_APPLE_ID        … Apple ID for notarization (email)
#   NOTARY_PASSWORD        … app-specific password (created at appleid.apple.com)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    # The .xcodeproj XcodeGen emits is a newer format (Xcode 16), so pick a runner
    # with a recent Xcode plus the latest-stable Xcode.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import cert.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm cert.p12

      - name: Build (Developer ID signed)
        env:
          SIGN_IDENTITY: "Developer ID Application"
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: ./scripts/build.sh

      - name: Notarize & staple
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
        run: ./scripts/notarize.sh

      - name: Attach .dmg to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: QuickLook3D.dmg
