name: QuickLook3D
options:
  bundleIdPrefix: com.sawazen
  deploymentTarget:
    macOS: "12.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    # No signing needed for your own Mac (Sign to Run Locally).
    # For distribution, set CODE_SIGN_IDENTITY / DEVELOPMENT_TEAM.
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual

targets:
  # ---------------------------------------------------------------------
  # Host app (the container that ships and distributes the extension)
  # ---------------------------------------------------------------------
  QuickLook3D:
    type: application
    platform: macOS
    sources:
      - QuickLook3D/App
    info:
      path: QuickLook3D/App/Info.plist
      # NOTE: XcodeGen generates Info.plist from the properties below (don't hand-edit it)
      properties:
        CFBundleDisplayName: 3D Quick Look
        NSPrincipalClass: NSApplication
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        # UTI declarations so the OS recognizes .vrm / .vrma / .fbx (also declared on the host app).
        # .vrma has no standard UTI; left alone it gets a dynamic UTI, so we declare our own.
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: com.vrm.vrm
            UTTypeDescription: VRM 3D Avatar
            UTTypeConformsTo:
              - public.data
            UTTypeTagSpecification:
              public.filename-extension:
                - vrm
          - UTTypeIdentifier: com.vrm.vrma
            UTTypeDescription: VRM Animation
            UTTypeConformsTo:
              - public.data
            UTTypeTagSpecification:
              public.filename-extension:
                - vrma
          - UTTypeIdentifier: com.autodesk.fbx
            UTTypeDescription: FBX 3D Model
            UTTypeConformsTo:
              - public.data
              - public.3d-content
            UTTypeTagSpecification:
              public.filename-extension:
                - fbx
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sawazen.QuickLook3D
        CODE_SIGN_ENTITLEMENTS: QuickLook3D/App/QuickLook3D.entitlements
        ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - target: QuickLook3DExtension
        embed: true

  # ---------------------------------------------------------------------
  # Quick Look preview extension (the actual plugin)
  # ---------------------------------------------------------------------
  QuickLook3DExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: QuickLook3D/Extension
        excludes:
          - Resources
          - Info.plist
      # Bundle the Vite-built front end as a "folder reference (blue folder)".
      # This keeps Resources/renderer/index.html intact inside the bundle, so it can be
      # found via Bundle.main.url(... subdirectory: "renderer").
      - path: QuickLook3D/Extension/Resources/renderer
        type: folder
    info:
      path: QuickLook3D/Extension/Info.plist
      # NOTE: XcodeGen generates Info.plist from the properties below (don't hand-edit it)
      properties:
        CFBundleDisplayName: 3D Quick Look
        # Declares this as a Quick Look extension
        NSExtension:
          NSExtensionPointIdentifier: com.apple.quicklook.preview
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).PreviewViewController
          NSExtensionAttributes:
            # UTIs this plugin can preview
            #   com.vrm.vrm / .vrma … our own UTIs declared below
            #   org.khronos.glb      … macOS's built-in UTI for GLB (no declaration needed)
            #   com.autodesk.*.fbx   … FBX UTIs (both registered to absorb environment differences)
            QLSupportedContentTypes:
              - com.vrm.vrm
              - com.vrm.vrma
              - org.khronos.glb
              - com.autodesk.mac.fbx
              - com.autodesk.fbx
            QLSupportsSearchableItems: false
        # Tell the OS about the .vrm / .vrma / .fbx extensions and UTIs
        # (.glb already has macOS's built-in org.khronos.glb, so no declaration needed)
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: com.vrm.vrm
            UTTypeDescription: VRM 3D Avatar
            UTTypeConformsTo:
              - public.data
            UTTypeTagSpecification:
              public.filename-extension:
                - vrm
          - UTTypeIdentifier: com.vrm.vrma
            UTTypeDescription: VRM Animation
            UTTypeConformsTo:
              - public.data
            UTTypeTagSpecification:
              public.filename-extension:
                - vrma
          - UTTypeIdentifier: com.autodesk.fbx
            UTTypeDescription: FBX 3D Model
            UTTypeConformsTo:
              - public.data
              - public.3d-content
            UTTypeTagSpecification:
              public.filename-extension:
                - fbx
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sawazen.QuickLook3D.Extension
        CODE_SIGN_ENTITLEMENTS: QuickLook3D/Extension/QuickLook3DExtension.entitlements
        ENABLE_HARDENED_RUNTIME: YES
    # Rebuild the renderer and copy it into Resources/renderer on every build.
    preBuildScripts:
      - name: Build renderer (Vite)
        script: |
          set -e
          cd "$SRCROOT/renderer"
          if [ -z "$(which node)" ]; then
            echo "warning: node not found; skipping the renderer build"
            exit 0
          fi
          [ -d node_modules ] || npm install
          npm run build
          DEST="$SRCROOT/QuickLook3D/Extension/Resources/renderer"
          mkdir -p "$DEST"
          rm -rf "$DEST"/*
          cp -R dist/* "$DEST/"
        basedOnDependencyAnalysis: false
